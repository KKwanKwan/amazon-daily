name: 亚马逊每日资讯推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 检查文件
        run: |
          echo "=== 根目录 ==="
          ls -la *.py 2>/dev/null || echo "⚠ 没有 .py 文件！"
      - name: 运行
        run: python3 run.py
      - name: 提交档案
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/history.json
          if git diff --cached --quiet; then echo "无变化"; else git commit -m "daily $(date +%F)" && git push; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: 部署 Pages
        id: deployment
        uses: actions/deploy-pages@v4
